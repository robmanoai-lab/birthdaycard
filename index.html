<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ucapan Ulang Tahun - Elegan</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-blue: #0f2027;
            --mid-blue: #203a43;
            --silver: #c0c0c0;
            --gold-accent: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(to right, var(--deep-blue), var(--mid-blue));
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .card-frame {
            width: 90%;
            max-width: 500px;
            height: 80vh;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .card-frame::before {
            content: '';
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 2px solid var(--silver);
            border-radius: 15px;
            pointer-events: none;
        }

        .slide {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 1s ease;
        }

        .slide.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--silver);
            margin-bottom: 10px;
        }

        h2 {
            font-weight: 400;
            letter-spacing: 2px;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        /* Update: Lingkaran menjadi Bingkai Foto */
        .photo-frame {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid var(--gold-accent);
            margin: 20px auto 10px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Style untuk Teks Umur di bawah foto */
        .age-text {
            font-size: 2.5rem;
            font-family: 'Playfair Display', serif;
            color: var(--gold-accent);
            margin-bottom: 5px;
        }

        .verse-container {
            font-style: italic;
            line-height: 1.8;
            font-size: 1rem;
            padding: 0 20px;
        }

        .verse-ref {
            display: block;
            margin-top: 15px;
            color: var(--gold-accent);
            font-weight: bold;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--silver);
            color: var(--silver);
            padding: 10px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: var(--silver);
            color: var(--deep-blue);
        }

        .btn-primary {
            background: var(--gold-accent);
            border-color: var(--gold-accent);
            color: var(--deep-blue);
            font-weight: bold;
        }
        
        .progress-dots {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 10px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
        }
        .dot.active {
            background: var(--silver);
        }
        
    </style>
</head>
<body>

    <audio id="bg-music" loop preload="auto">
        <source src="happy_birthday.mp3" type="audio/mpeg">
        <source src="https://upload.wikimedia.org/wikipedia/commons/transcoded/6/61/Happy_Birthday_to_You_-_instrumental.ogg/Happy_Birthday_to_You_-_instrumental.ogg.mp3" type="audio/mpeg">
    </audio>

    <div class="card-frame">
        
        <div class="slide active" id="slide-1">
            <h1 style="font-size: 2rem;">Kartu Ucapan</h1>
            <p>Spesial untuk:</p>
            <h2 id="name-display-1" style="color: var(--gold-accent); font-size: 1.5rem;">[Nama]</h2>
            <button class="btn btn-primary" onclick="startExperience()">Buka Kartu</button>
        </div>

        <div class="slide" id="slide-2">
            <h1>Selamat Ulang Tahun</h1>
            
            <div class="photo-frame">
                <img src="foto_st_edward_purba.jpg" alt="St. Edward Purba">
            </div>

            <div class="age-text" id="age-display">XX</div>
            
            <p>Tahun Berkat & Penyertaan Tuhan</p>
            <button class="btn" onclick="nextSlide(3)">Lihat Ayat >> </button>
        </div>

        <div class="slide" id="slide-3">
            <div class="verse-container">
                "Lord, thank You for guiding my life until today. The Lord will fulfill His purpose for me."
                <span class="verse-ref">Mazmur 138:8</span>
            </div>
            <button class="btn" onclick="nextSlide(4)">Lanjut >> </button>
        </div>

        <div class="slide" id="slide-4">
            <p>Tuhan Yesus Memberkati senantiasa dengan kesehatan dan sukacita.</p>
            <br>
            <hr style="width: 50%; opacity: 0.3;">
            <br>
            <p style="font-size: 0.9rem;">Salam Kasih,</p>
            <h3 id="sender-display" style="color: var(--gold-accent);">[Pengirim]</h3>
            <button class="btn" onclick="nextSlide(1)">Ulangi</button>
        </div>

        <div class="progress-dots">
            <div class="dot active" id="dot-1"></div>
            <div class="dot" id="dot-2"></div>
            <div class="dot" id="dot-3"></div>
            <div class="dot" id="dot-4"></div>
        </div>
    </div>

    <script>
        const config = {
            nama: "St. Edward Purba",
            umur: "59", // Saya isikan 60 sebagai contoh, silakan ubah di sini
            pengirim: "St. Robert Manihuruk"
        };

        document.getElementById('name-display-1').innerText = config.nama;
        document.getElementById('age-display').innerText = config.umur;
        document.getElementById('sender-display').innerText = config.pengirim;

        const music = document.getElementById('bg-music');

        function startExperience() {
            attemptPlayMusic();
            nextSlide(2);
        }

        function attemptPlayMusic() {
            music.volume = 1.0; 
            music.muted = false;
            var promise = music.play();
            if (promise !== undefined) {
                promise.then(_ => {
                    console.log("Musik dimulai.");
                }).catch(error => {
                    console.log("Autoplay dicegah.");
                });
            }
        }

        function nextSlide(slideIndex) {
            document.querySelectorAll('.slide').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.dot').forEach(el => el.classList.remove('active'));
            document.getElementById('slide-' + slideIndex).classList.add('active');
            document.getElementById('dot-' + slideIndex).classList.add('active');
        }
    </script>
</body>
</html>
